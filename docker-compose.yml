version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dont_forget_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dont_forget
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
